    <script>
      function initWsConnection() {
        if (!isInIframe()) {
          window.socket = new SocketIOClientProxy({ socketHost: 'wss://socket8.donationalerts.com:443', widgetToken: token })
        } else {
          window.socket = null;
        }
      }

      initWsConnection();

      if (AlertLogger && !window.alertLogger) {
        window.alertLogger = new AlertLogger()
      }

      if (YoutubeClientProxy && !window.youtubeClientProxy) {
        window.youtubeClientProxy = new YoutubeClientProxy({ widgetToken: token, fallback: group_id === 1 })
      }

      if (TwitchClientProxy && !window.twitchClientProxy) {
        window.twitchClientProxy = new TwitchClientProxy({ widgetToken: token, fallback: group_id === 1 })
      }

      if (socket !== null) {
        socket.on('connect', function (msg) {
          console.log('WS: connected');
          if (da_debug) debug('Connected to WS server');
        });

        socket.on('connect_error', function (msg) {
          console.log('WS: connection_error');
          if (da_debug) debug('Could not connect to WS server');
        });

        socket.on('connect_timeout', function (msg) {
          console.log('WS: connection_timeout');
          if (da_debug) debug('Connection to WS server is timed out');
        });

        socket.on('reconnect', function (msg) {
          console.log('WS: reconnected');
          if (da_debug) debug('Reconnected to WS server');
        });

        socket.on('donation', function (msg) {
          if (da_debug) debug('Received new message');
          new_donation = $.parseJSON(msg);
          try {
            if (typeof new_donation.is_shown !== 'undefined' && parseInt(new_donation.is_shown) == 1) {
              return;
            }
          } catch (err) {}
          if ($.grep(alerts_array[String(new_donation.alert_type)], function (e) {
            return e.id == String(new_donation.id);
          }).length == 0) {
            alerts_array[String(new_donation.alert_type)].push(new_donation);
            if (da_debug) debug('Added message to the queue');
            if (da_debug) debug('Queue items count of type ' + new_donation.alert_type + ': ' + alerts_array[String(new_donation.alert_type)].length);
          }
          if (dPoll.poll_is_available == true && dPoll.is_displaying == true) {
            dPoll.getData(false, true);
          }
        });

        socket.on('update-alert_widget', function (msg) {
          alert_data = $.parseJSON(msg);
          console.log(alert_data);
          if (typeof alert_data['_additional'] !== 'undefined') {
            if (typeof alert_data['_additional'].reload !== 'undefined' && alert_data['_additional'].reload == 1) {
              location.reload();
            }
          }
          initWidget(alert_data);
          updateData();
        });

        socket.on('update-user_general_widget_settings', function (msg) {
          handleGeneralWidgetSettings(msg);
        });

        socket.on('alert-show', function (msg) {
          var msg = $.parseJSON(msg);
          if (msg.action == 'skip') {
            skipCurrentAlert(msg.alert_id, msg.alert_type);
          } else if (msg.action == 'show-now') {
            moderated_alerts[String(msg.alert_type)].push(parseInt(msg.alert_id));
          }
        });
      }

      var muted_subgifts = {};

      logWidget();

      window.tryToUpdateWidget = function() {
        if (!window.is_alerting && !window.is_speaking && !dPoll.is_displaying) {
          location.reload()
        } else {
          setTimeout(tryToUpdateWidget, 5000)
        }
      }
    </script>
